name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build binaries
        run: |
          VERSION="${GITHUB_REF_NAME}"
          LDFLAGS="-s -w -X github.com/ngavilan-dogfy/woffuk-cli/cmd.Version=${VERSION}"
          mkdir -p dist
          GOOS=darwin  GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/woffuk-darwin-arm64 ./cmd/woffuk
          GOOS=darwin  GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/woffuk-darwin-amd64 ./cmd/woffuk
          GOOS=linux   GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/woffuk-linux-amd64  ./cmd/woffuk
          GOOS=linux   GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/woffuk-linux-arm64  ./cmd/woffuk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/woffuk-darwin-arm64
            dist/woffuk-darwin-amd64
            dist/woffuk-linux-amd64
            dist/woffuk-linux-arm64
